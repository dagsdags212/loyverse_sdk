[project]
name = "loyverse-api"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "dagsdags212", email = "jegsamson.dev@gmail.com" } 
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12.4",
    "pydantic-settings>=2.12.0",
    "httpx>=0.28.1",
    "pytest>=9.0.1",
    "sqlmodel>=0.0.27",
    "rich>=14.2.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[project.scripts]
loyverse-api = "loyverse_api:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
